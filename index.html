<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="favicon-tren-691C32-32.png" sizes="32x32">
  <title>Unidad de Construcción</title>

  <style>
    :root {
      --fondo-vino: #691c32;
      --gris-badge: #9b8f95;
      --texto-claro: #ffffff;
      --amarillo-link: #facc6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--fondo-vino);
      color: var(--texto-claro);
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ======================
       Columna izquierda: mapa
       ====================== */
    .col-izq {
      flex: 1.1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .mapa-wrap{
      width: 100%;
      max-width: 980px; /* ajusta si quieres más grande */
    }

    .col-izq img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
    }

    /* ✅ BOTONES ABAJO de la imagen */
    .map-buttons{
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
    }

    .map-btn{
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;

      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.35);
      background: rgba(0,0,0,.22);
      color: #fff;

      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
      text-decoration: none;

      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
      user-select: none;
    }

    .map-btn:hover{
      transform: translateY(-1px);
      background: rgba(0,0,0,.32);
      border-color: rgba(255,255,255,.55);
    }

    .map-btn:active{
      transform: translateY(0) scale(.99);
    }

    .map-btn:focus-visible{
      outline: 2px solid rgba(250,204,107,.95);
      outline-offset: 3px;
    }

    .map-btn--sec{
      background: rgba(255,255,255,.10);
    }

    /* =========================
       Columna derecha: texto/fases
       ========================= */
    .col-der {
      flex: 1;
      padding: 3rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.85rem;
      opacity: 0.8;
      margin: 0 0 0.5rem;
    }

    h1 {
      font-size: 3rem;
      margin: 0 0 2rem;
      line-height: 1.1;
    }

    .fase {
      margin-bottom: 1.4rem;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 14px;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    .fase-boton {
      width: 100%;
      border: none;
      outline: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      background: linear-gradient(135deg, var(--gris-badge), #b6a9b0);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 14px 14px 0 0;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }

    .fase-titulo { pointer-events: none; }

    .fase-icono {
      font-size: 1.2rem;
      transition: transform 0.3s ease;
      pointer-events: none;
    }

    .fase-contenido {
      padding: 0 1.2rem 0;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(-4px);
      transition: max-height 0.45s ease, opacity 0.35s ease, transform 0.35s ease;
    }

    .fase-contenido ul {
      margin: 0.7rem 0 1.1rem;
      padding-left: 1.2rem;
      list-style: disc;
    }

    .fase-contenido li {
      margin-bottom: 0.25rem;
      font-size: 0.98rem;
    }

    .tramo-link {
      color: var(--amarillo-link);
      text-decoration: none;
      font-weight: 600;
      position: relative;
      padding-right: 1.2rem;
    }

    .tramo-link::after {
      content: "↗";
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      opacity: 0.9;
    }

    .tramo-link:hover {
      text-decoration: underline;
      opacity: 0.95;
    }

    .fase.abierta .fase-contenido {
      max-height: 260px;
      opacity: 1;
      transform: translateY(0);
    }

    .fase.abierta .fase-icono { transform: rotate(90deg); }

    /* ===== Responsive ===== */
    @media (max-width: 960px) {
      .layout { flex-direction: column; }
      .col-izq, .col-der { padding: 1.5rem; }
      .col-der { order: -1; }
      h1 { font-size: 2.2rem; }
    }

    @media (max-width: 600px) {
      .col-der { padding: 1.2rem; }
      h1 { font-size: 1.9rem; }
      .map-buttons { flex-direction: column; }
      .map-btn { width: 100%; }
    }
  </style>
</head>

<body>
  <div class="layout">
    <!-- IZQUIERDA: MAPA + BOTONES ABAJO -->
    <section class="col-izq">
      <div class="mapa-wrap">
        <img src="mapa-tren.png" alt="Mapa de rutas ferroviarias" />

        <!-- ✅ Botones debajo de la imagen (como tus cuadros rojos) -->
        <div class="map-buttons">
          <a class="map-btn map-btn--sec" href="#" title="DICCO">DICCO</a>

          <a class="map-btn"
             href="https://sites.google.com/view/organigramaattrapi/p%C3%A1gina-principal?authuser=1"
             target="_blank" rel="noopener"
             title="DPAO">
            DPAO
          </a>
        </div>
      </div>
    </section>

    <!-- DERECHA: TÍTULO Y FASES -->
    <section class="col-der">
      <p class="eyebrow">INICIO</p>
      <h1>UNIDAD DE CONSTRUCCIÓN</h1>

      <!-- FASE 1 -->
      <div class="fase">
        <button class="fase-boton fase-toggle" aria-expanded="false" type="button">
          <span class="fase-titulo">Fase 1 – (787 km)</span>
          <span class="fase-icono">▶</span>
        </button>
        <div class="fase-contenido">
          <ul>
            <li>Ciudad de México – Pachuca</li>
            <li>Ciudad de México – Querétaro</li>
            <li>
              <a class="tramo-link"
                 href="https://attrapi.github.io/lineadeltiempo-queretaro-irapuato/"
                 target="_blank" rel="noopener">
                Querétaro – Irapuato
              </a>
            </li>
            <li>
              <a class="tramo-link"
                 href="https://attrapi.github.io/lineadeltiempo-saltillo-nuevolaredo/"
                 target="_blank" rel="noopener">
                Saltillo – Nuevo Laredo
              </a>
            </li>
          </ul>
        </div>
      </div>

      <!-- FASE 2 -->
      <div class="fase">
        <button class="fase-boton fase-toggle" aria-expanded="false" type="button">
          <span class="fase-titulo">Fase 2 – (1,336 km)</span>
          <span class="fase-icono">▶</span>
        </button>
        <div class="fase-contenido">
          <ul>
            <li>Irapuato – Guadalajara</li>
            <li>Querétaro – San Luis Potosí</li>
            <li>San Luis Potosí – Saltillo</li>
            <li>Mazatlán – Los Mochis</li>
          </ul>
        </div>
      </div>
    </section>
  </div>

  <script>
    document.querySelectorAll(".fase-toggle").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const fase = btn.closest(".fase");
        const abierta = fase.classList.toggle("abierta");
        btn.setAttribute("aria-expanded", abierta ? "true" : "false");
      });
    });
  </script>
</body>
</html>
